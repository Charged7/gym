{% extends "base.html" %}
{% block title %}Сброс пароля{% endblock %}
{% block content %}
<h2>Введите новый пароль для {{ username }}</h2>
<form method="post">
    <input name="password" type="password" placeholder="Новый пароль" required class="form-control mb-2">
    <button type="submit" class="btn btn-success">Сменить пароль</button>
</form>
{% endblock %}
