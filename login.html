{% extends "base.html" %}
{% block title %}Вход{% endblock %}
{% block content %}
<h2>Вход</h2>
<form method="post">
    <div class="mb-3">
        <input name="username" class="form-control" placeholder="Почта" required>
    </div>
    <div class="mb-3">
        <input name="password" type="password" class="form-control" placeholder="Пароль" required>
    </div>
    <button type="submit" class="btn btn-success">Войти</button>
</form>
<p class="mt-2">Нет аккаунта? <a href="{{ url_for('register') }}">Регистрация</a></p>
<p class="mt-2">Забыли пароль? <a href="{{ url_for('reset_password_request') }}">Восстановить пароль</a></p>
{% endblock %}
