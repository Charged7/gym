{% extends "base.html" %}
{% block title %}Регистрация{% endblock %}
{% block content %}
<h2>Регистрация</h2>
<form method="post">
    <div class="mb-3">
        <input name="username" class="form-control" placeholder="Почта" required value="{{ username or '' }}">
    </div>
    <div class="mb-3">
        <input name="password" type="password" class="form-control" placeholder="Пароль" required>
    </div>
    <div class="mb-3">
        <input name="confirm_password" type="password" class="form-control" placeholder="Подтвердить пароль" required>
    </div>

    {% with messages = get_flashed_messages(with_categories=true) %}
        {% for category, message in messages %}
            <div class="alert alert-{{ category }}">{{ message }}</div>
        {% endfor %}
    {% endwith %}

    <button type="submit" class="btn btn-primary">Зарегистрироваться</button>
</form>
<p class="mt-2">Уже есть аккаунт? <a href="{{ url_for('login') }}">Войти</a></p>
{% endblock %}
